<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operatorlar Kunlik Hisobot Tizimi</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f5f7fa;
            --text-color: #333;
            --border-color: #e1e4e8;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        h2 {
            color: #2c3e50;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 8px;
        }
        .card {
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }
        input[type="text"], textarea, select {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea {
            height: 100px;
            resize: vertical;
        }
        button {
            background-color: var(--primary-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #357abd;
        }
        .table-responsive {
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
        }
        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        th {
            background-color: #f8f9fa;
            font-weight: 600;
        }
        tr:hover {
            background-color: #f1f3f5;
        }
        .status-ishda { color: #2ecc71; font-weight: bold; }
        .status-sababli { color: #f1c40f; font-weight: bold; }
        .status-sababsiz { color: #e74c3c; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">

    <!-- 1. MA'LUMOT KIRITISH FORMASI -->
    <div class="card">
        <h2>Kunlik Ma'lumot Kiritish Shakli</h2>
        <form id="reportForm">
            
            <!-- Operator Nomi (Tizimdan avtomat olish yoki tanlash uchun) -->
            <div class="form-group">
                <label for="operatorName">Operator ismi:</label>
                <input type="text" id="operatorName" required placeholder="Ismingizni kiriting...">
            </div>

            <!-- 1-Bo'lim: Sarkor Bo'limi -->
            <div class="form-group">
                <label for="sarkorSection">Sarkor bo'limi:</label>
                <input type="text" id="sarkorSection" required placeholder="Sarkor bo'limi bo'yicha hisobot yoki yo'nalish...">
            </div>

            <!-- 2-Bo'lim: ROP Kunlik Hisoboti -->
            <div class="form-group">
                <label for="ropReport">ROP kunlik hisobot bo'limi:</label>
                <textarea id="ropReport" required placeholder="Kunlik qo'ng'iroqlar, sotuvlar yoki KPI natijalari..."></textarea>
            </div>

            <!-- 3-Bo'lim: Davomat -->
            <div class="form-group">
                <label for="attendance">Davomat bo'limi:</label>
                <select id="attendance" required>
                    <option value="">Statusni tanlang</option>
                    <option value="Ishda">Ishda</option>
                    <option value="Sababli">Sababli kelmadi</option>
                    <option value="Sababsiz">Sababsiz kelmadi</option>
                </select>
            </div>

            <button type="submit">Hisobotni Saqlash</button>
        </form>
    </div>

    <!-- 2. RO'YXAT / DASHBOARD JADVALI -->
    <div class="card">
        <h2>Kiritilgan Kunlik Hisobotlar (Filiallarsiz Yangi Tizim)</h2>
        <div class="table-responsive">
            <table>
                <thead>
                    <tr>
                        <th>Vaqt</th>
                        <th>Operator</th>
                        <th>Sarkor bo'limi</th>
                        <th>ROP kunlik hisoboti</th>
                        <th>Davomat bo'limi</th>
                    </tr>
                </thead>
                <tbody id="reportsTableBody">
                    <!-- Firebase'dan keladigan qatorlar shu yerga tushadi -->
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- FIREBASE ULANISHI -->
<script type="module">
    // Firebase SDK modullari
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore.js";

    // DIQQAT: Quyidagi config'ga o'zingizning haqiqiy Firebase ma'lumotlaringizni qo'ying
    const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
    };

    // Firebase-ni ishga tushirish
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // FORM ELEMENTLARINI CHIQARISH
    const reportForm = document.getElementById('reportForm');
    const reportsTableBody = document.getElementById('reportsTableBody');

    // 1. MA'LUMOTNI FIREBASE'GA YUBORISH
    reportForm.addEventListener('submit', async (e) => {
        e.preventDefault();

        const reportData = {
            operatorName: document.getElementById('operatorName').value,
            sarkorData: document.getElementById('sarkorSection').value,
            ropDailyReport: document.getElementById('ropReport').value,
            attendanceStatus: document.getElementById('attendance').value,
            createdAt: serverTimestamp() // kiritilgan real vaqt
        };

        try {
            // "daily_reports" kolleksiyasiga yozadi (Filial maydoni umuman yo'q)
            await addDoc(collection(db, "daily_reports"), reportData);
            alert("Hisobot muvaffaqiyatli jo'natildi!");
            reportForm.reset();
        } catch (error) {
            console.error("Xatolik: ", error);
            alert("Ma'lumotni saqlashda xatolik yuz berdi.");
        }
    });

    // 2. REAL-TIME FIREBASE'DAN MA'LUMOTNI JADVALGA CHIQARISH
    const q = query(collection(db, "daily_reports"), orderBy("createdAt", "desc"));
    
    onSnapshot(q, (querySnapshot) => {
        reportsTableBody.innerHTML = ""; // Jadvalni tozalash
        
        querySnapshot.forEach((doc) => {
            const data = doc.data();
            
            // Vaqtni chiroyli formatlash
            let formattedTime = "Hozirgina";
            if(data.createdAt) {
                const date = data.createdAt.toDate();
                formattedTime = date.toLocaleString('uz-UZ', { hour: '2-digit', minute: '2-digit', day: '2-digit', month: '2-digit' });
            }

            // Davomat rangini belgilash uchun klass
            let statusClass = "";
            if (data.attendanceStatus === "Ishda") statusClass = "status-ishda";
            if (data.attendanceStatus === "Sababli") statusClass = "status-sababli";
            if (data.attendanceStatus === "Sababsiz") statusClass = "status-sababsiz";

            // Yangi qator yaratish (Eski filial ustunisiz)
            const row = `
                <tr>
                    <td>${formattedTime}</td>
                    <td><strong>${data.operatorName}</strong></td>
                    <td>${data.sarkorData}</td>
                    <td>${data.ropDailyReport}</td>
                    <td><span class="${statusClass}">${data.attendanceStatus}</span></td>
                </tr>
            `;
            reportsTableBody.innerHTML += row;
        });
    });
</script>

</body>
</html>
