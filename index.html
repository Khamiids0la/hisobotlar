<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hisobotchi by khamiid</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>
    <style>
        .page-section { display: none; }
        .page-section.active { display: block; }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div id="login-section" class="page-section active min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md border border-gray-100">
            <div class="text-center mb-8">
                <h2 class="text-3xl font-extrabold text-gray-800">Hisobotchi</h2>
                <p class="text-gray-400 mt-2 text-sm">by khamiid | Tizimga kirish</p>
            </div>
            <form id="login-form" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Foydalanuvchi nomi</label>
                    <input type="text" id="login-username" required class="w-full border border-gray-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-600 mb-1">Parol</label>
                    <input type="password" id="login-password" required class="w-full border border-gray-300 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <div id="login-error" class="text-red-500 text-sm hidden text-center font-medium"></div>
                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded-xl shadow-lg shadow-blue-200 transition">Kirish</button>
            </form>
        </div>
    </div>

    <div id="app-section" class="page-section min-h-screen flex flex-col">
        <header class="bg-white shadow-sm border-b border-gray-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-3">
                <h1 class="text-xl font-bold text-gray-800">Hisobotchi <span class="text-blue-600 font-medium text-sm">by khamiid</span></h1>
                <span id="user-badge" class="text-xs font-semibold px-2.5 py-1 rounded-full"></span>
            </div>
            <div class="flex items-center gap-4">
                <span id="user-display-name" class="font-medium text-gray-700 hidden sm:inline"></span>
                <button onclick="logout()" class="text-sm font-medium text-red-600 hover:text-red-800 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded-xl transition">Chiqish</button>
            </div>
        </header>

        <main class="flex-1 p-6 max-w-7xl w-full mx-auto">
            
            <div id="dashboard-panel" class="space-y-6 hidden">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <p class="text-sm font-medium text-gray-400 uppercase tracking-wider">Jami Savdo</p>
                        <h3 id="kpi-total-sales" class="text-3xl font-bold text-gray-800 mt-2">0 UZS</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <p class="text-sm font-medium text-gray-400 uppercase tracking-wider">Muvaffaqiyatli Bitimlar</p>
                        <h3 id="kpi-success-count" class="text-3xl font-bold text-green-600 mt-2">0</h3>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <p class="text-sm font-medium text-gray-400 uppercase tracking-wider">Rad Etilganlar (Unqualified)</p>
                        <h3 id="kpi-failed-count" class="text-3xl font-bold text-red-500 mt-2">0</h3>
                    </div>
                </div>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <h4 class="text-lg font-semibold text-gray-700 mb-4">Savdo Dinamikasi</h4>
                        <div id="sales-chart"></div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <h4 class="text-lg font-semibold text-gray-700 mb-4">Statuslar Taqsimoti</h4>
                        <div id="status-chart"></div>
                    </div>
                </div>

                <div id="admin-management-section" class="grid grid-cols-1 lg:grid-cols-3 gap-6 pt-4 hidden">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 h-fit">
                        <h3 id="form-title" class="text-lg font-semibold text-gray-700 mb-4">Foydalanuvchi Yaratish</h3>
                        <form id="user-form" class="space-y-4">
                            <input type="hidden" id="edit-id">
                            <div>
                                <label class="block text-xs font-medium text-gray-500 mb-1">Login (Kichik harflarda)</label>
                                <input type="text" id="username" required class="w-full border border-gray-200 rounded-xl p-2.5 focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-500 mb-1">Parol</label>
                                <input type="password" id="password" required class="w-full border border-gray-200 rounded-xl p-2.5 focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-500 mb-1">F.I.SH (To'liq ismi)</label>
                                <input type="text" id="fullname" required class="w-full border border-gray-200 rounded-xl p-2.5 focus:ring-2 focus:ring-blue-500 outline-none text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-medium text-gray-500 mb-1">Roli</label>
                                <select id="role" class="w-full border border-gray-200 rounded-xl p-2.5 focus:ring-2 focus:ring-blue-500 outline-none text-sm bg-white">
                                    <option value="worker">Worker (Operator)</option>
                                    <option value="boss">Boss (Boshliq - Faqat ko'rish)</option>
                                </select>
                            </div>
                            <div class="flex gap-2 pt-2">
                                <button type="submit" id="submit-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-2.5 rounded-xl text-sm transition">Saqlash</button>
                                <button type="button" id="cancel-btn" class="hidden w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-2.5 rounded-xl text-sm transition">Bekor qilish</button>
                            </div>
                        </form>
                    </div>

                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100 lg:col-span-2">
                        <h3 class="text-lg font-semibold text-gray-700 mb-4">Tizim Foydalanuvchilari (CRUD)</h3>
                        <div class="overflow-x-auto">
                            <table class="w-full text-left border-collapse text-sm">
                                <thead>
                                    <tr class="border-b border-gray-100 text-gray-400 font-medium">
                                        <th class="pb-3">Login</th>
                                        <th class="pb-3">Ismi</th>
                                        <th class="pb-3">Roli</th>
                                        <th class="pb-3 text-right">Amallar</th>
                                    </tr>
                                </thead>
                                <tbody id="users-table-body" class="text-gray-600 divide-y divide-gray-50">
                                    </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>

            <div id="worker-panel" class="max-w-xl mx-auto hidden">
                <div class="bg-white p-8 rounded-2xl shadow-sm border border-gray-100">
                    <h3 class="text-xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                        <span>📝 Kunlik Hisobot Yo'llash</span>
                    </h3>
                    <form id="report-form" class="space-y-5">
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">Mijoz / Qo'ng'iroq Statusi</label>
                            <select id="report-status" class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none bg-white transition">
                                <option value="success">Muvaffaqiyatli (Sotuv bo'ldi)</option>
                                <option value="warm">O'ylab ko'radi (Iliq mijoz)</option>
                                <option value="unqualified">Unqualified (Sotuv bo'lmadi / Rad etdi)</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">Savdo Summasi (so'mda)</label>
                            <input type="number" id="report-amount" value="0" class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">Hudud / Filial</label>
                            <select id="report-region" class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none bg-white transition">
                                <option value="Toshkent">Tashkent</option>
                                <option value="Farg'ona">Fergana</option>
                                <option value="Namangan">Namangan</option>
                                <option value="Andijon">Andijon</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">Izoh</label>
                            <textarea id="report-comment" rows="3" placeholder="Mijoz haqida batafsil..." class="w-full border border-gray-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 outline-none transition"></textarea>
                        </div>
                        <button type="submit" class="w-full bg-green-600 hover:bg-green-700 text-white font-semibold py-3 rounded-xl shadow-lg shadow-green-100 transition">Hisobotni Jo'natish</button>
                    </form>
                </div>
            </div>

        </main>
    </div>

    <script>
        const baseUrl = "https://hisotb-46af8-default-rtdb.firebaseio.com/";
        let currentUser = null;
        let salesChart = null;
        let statusChart = null;

        function switchPage(sectionId) {
            document.querySelectorAll('.page-section').forEach(sec => sec.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
        }

        // TIZIMGA KIRISH (AUTH) & ROLLAR TAQSIMOTI
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const user = document.getElementById('login-username').value.trim().toLowerCase();
            const pass = document.getElementById('login-password').value;
            const errorDiv = document.getElementById('login-error');
            errorDiv.classList.add('hidden');

            // 1. Asosiy Super Admin Nazorati (khamiid : 2236) -> TO'LIQ DOSTUP
            if (user === 'khamiid' && pass === '2236') {
                currentUser = { username: 'khamiid', role: 'superboss', fullName: 'Khamid' };
                initApp();
                return;
            }

            // 2. Oddiy foydalanuvchilarni bazadan tekshirish
            try {
                const res = await fetch(`${baseUrl}users/${user}.json`);
                const userData = await res.json();

                if (userData && userData.password === pass) {
                    currentUser = { username: user, ...userData };
                    initApp();
                } else {
                    errorDiv.innerText = "Login yoki parol noto'g'ri!";
                    errorDiv.classList.remove('hidden');
                }
            } catch (err) {
                errorDiv.innerText = "Firebase bilan ulanishda xatolik.";
                errorDiv.classList.remove('hidden');
            }
        });

        // ILOVANI DINAMIK ISHGA TUSHIRISH
        function initApp() {
            switchPage('app-section');
            document.getElementById('user-display-name').innerText = currentUser.fullName;
            
            const badge = document.getElementById('user-badge');
            
            // Panellarni yopib turish
            document.getElementById('dashboard-panel').classList.add('hidden');
            document.getElementById('admin-management-section').classList.add('hidden');
            document.getElementById('worker-panel').classList.add('hidden');

            if (currentUser.role === 'superboss') {
                // KHAMIID: Full dostup (Dashboard + CRUD boshqaruv)
                badge.innerText = 'SUPER BOSS';
                badge.className = 'text-xs font-semibold px-2.5 py-1 rounded-full bg-red-100 text-red-700';
                document.getElementById('dashboard-panel').classList.remove('hidden');
                document.getElementById('admin-management-section').classList.remove('hidden'); // Admin bo'lim ochiladi
                loadUsersList();
                loadDashboardData();
            } 
            else if (currentUser.role === 'boss') {
                // BOSS: Faqat ma'lumotlarni ko'rish (CRUD berkitilgan)
                badge.innerText = 'BOSS (FAKАТ KO\'RISH)';
                badge.className = 'text-xs font-semibold px-2.5 py-1 rounded-full bg-purple-100 text-purple-700';
                document.getElementById('dashboard-panel').classList.remove('hidden');
                loadDashboardData(); // Grafiklar yuklanadi, lekin boshqaruv paneli yopiq qoladi
            } 
            else {
                // WORKER: Faqat hisobot yozish
                badge.innerText = 'WORKER';
                badge.className = 'text-xs font-semibold px-2.5 py-1 rounded-full bg-green-100 text-green-700';
                document.getElementById('worker-panel').classList.remove('hidden');
            }
        }

        window.logout = function() {
            currentUser = null;
            document.getElementById('login-form').reset();
            switchPage('login-section');
        }

        // ==========================================
        // 🛠️ ADMIN (KHAMIID): USER CRUD
        // ==========================================
        const userForm = document.getElementById('user-form');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const fullnameInput = document.getElementById('fullname');
        const roleSelect = document.getElementById('role');
        const editIdInput = document.getElementById('edit-id');
        const submitBtn = document.getElementById('submit-btn');
        const cancelBtn = document.getElementById('cancel-btn');
        const tableBody = document.getElementById('users-table-body');

        async function loadUsersList() {
            const res = await fetch(`${baseUrl}users.json`);
            const data = await res.json();
            tableBody.innerHTML = '';
            
            if (!data) return;

            Object.keys(data).forEach(key => {
                const user = data[key];
                const isBoss = user.role === 'boss';
                const roleBadge = isBoss 
                    ? '<span class="bg-purple-100 text-purple-700 text-xs px-2 py-0.5 rounded-md font-medium">Boss (Read)</span>' 
                    : '<span class="bg-green-100 text-green-700 text-xs px-2 py-0.5 rounded-md font-medium">Worker</span>';

                const tr = document.createElement('tr');
                tr.className = "hover:bg-gray-50 transition";
                tr.innerHTML = `
                    <td class="py-3 font-medium text-gray-900">${key}</td>
                    <td class="py-3">${user.fullName}</td>
                    <td class="py-3">${roleBadge}</td>
                    <td class="py-3 text-right space-x-2">
                        <button onclick="editUser('${key}', '${user.fullName}', '${user.role}', '${user.password}')" class="text-blue-600 hover:text-blue-800 font-medium cursor-pointer">Tahrirlash</button>
                        <button onclick="deleteUser('${key}')" class="text-red-600 hover:text-red-800 font-medium cursor-pointer">O'chirish</button>
                    </td>
                `;
                tableBody.appendChild(tr);
            });
        }

        userForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = usernameInput.value.trim().toLowerCase().replace(/[^a-z0-9_]/g, '');
            const password = passwordInput.value;
            const fullName = fullnameInput.value;
            const role = roleSelect.value;
            const editId = editIdInput.value;

            const userData = { password, fullName, role };

            if (editId) {
                await fetch(`${baseUrl}users/${editId}.json`, { method: 'PATCH', body: JSON.stringify(userData) });
            } else {
                await fetch(`${baseUrl}users/${username}.json`, { method: 'PUT', body: JSON.stringify(userData) });
            }
            resetUserForm();
            loadUsersList();
        });

        window.editUser = function(id, fullName, role, password) {
            editIdInput.value = id;
            usernameInput.value = id;
            usernameInput.disabled = true;
            passwordInput.value = password;
            fullnameInput.value = fullName;
            roleSelect.value = role;
            
            document.getElementById('form-title').innerText = "Foydalanuvchini Tahrirlash";
            submitBtn.innerText = "Yangilash";
            cancelBtn.classList.remove('hidden');
        };

        window.deleteUser = async function(id) {
            if (confirm(`Haqiqatdan ham "${id}" foydalanuvchisini o'chirmoqchisiz?`)) {
                await fetch(`${baseUrl}users/${id}.json`, { method: 'DELETE' });
                loadUsersList();
            }
        };

        cancelBtn.addEventListener('click', resetUserForm);
        function resetUserForm() {
            userForm.reset();
            editIdInput.value = '';
            usernameInput.disabled = false;
            document.getElementById('form-title').innerText = "Foydalanuvchi Yaratish";
            submitBtn.innerText = "Saqlash";
            cancelBtn.classList.add('hidden');
        }

        // ==========================================
        // 📝 WORKER: HISOBOT YUBORISH
        // ==========================================
        document.getElementById('report-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const status = document.getElementById('report-status').value;
            const amount = parseFloat(document.getElementById('report-amount').value) || 0;
            const region = document.getElementById('report-region').value;
            const comment = document.getElementById('report-comment').value;

            const reportData = {
                operator: currentUser.username,
                operatorName: currentUser.fullName,
                status: status,
                amount: status === 'success' ? amount : 0,
                region: region,
                comment: comment,
                date: new Date().toISOString()
            };

            try {
                await fetch(`${baseUrl}reports.json`, { method: 'POST', body: JSON.stringify(reportData) });
                alert("Hisobot muvaffaqiyatli saqlandi!");
                document.getElementById('report-form').reset();
                document.getElementById('report-amount').value = 0;
            } catch (err) {
                alert("Xatolik yuz berdi.");
            }
        });

        // ==========================================
        // 📊 DASHBOARD & APEXCHARTS (KHAMIID & BOSS)
        // ==========================================
        async function loadDashboardData() {
            const res = await fetch(`${baseUrl}reports.json`);
            const data = await res.json();

            let totalSales = 0; let successCount = 0; let failedCount = 0; let warmCount = 0;
            let regionSales = { "Toshkent": 0, "Farg'ona": 0, "Namangan": 0, "Andijon": 0 };

            if (data) {
                Object.keys(data).forEach(key => {
                    const r = data[key];
                    if (r.status === 'success') {
                        successCount++;
                        totalSales += (r.amount || 0);
                        if (regionSales[r.region] !== undefined) regionSales[r.region] += (r.amount || 0);
                    } else if (r.status === 'unqualified') {
                        failedCount++;
                    } else if (r.status === 'warm') {
                        warmCount++;
                    }
                });
            }

            document.getElementById('kpi-total-sales').innerText = totalSales.toLocaleString('uz-UZ') + " UZS";
            document.getElementById('kpi-success-count').innerText = successCount;
            document.getElementById('kpi-failed-count').innerText = failedCount;

            renderCharts(regionSales, successCount, warmCount, failedCount);
        }

        function renderCharts(regionSales, success, warm, failed) {
            const salesOptions = {
                chart: { type: 'bar', height: 300, toolbar: { show: false } },
                series: [{ name: 'Savdo Summasi', data: Object.values(regionSales) }],
                xaxis: { categories: Object.keys(regionSales) },
                colors: ['#3B82F6'],
                plotOptions: { bar: { borderRadius: 6, columnName: '45%' } },
                dataLabels: { enabled: false }
            };

            if (salesChart) salesChart.destroy();
            salesChart = new ApexCharts(document.querySelector("#sales-chart"), salesOptions);
            salesChart.render();

            const statusOptions = {
                chart: { type: 'donut', height: 300 },
                series: [success, warm, failed],
                labels: ['Muvaffaqiyatli', 'Iliq', 'Rad etilgan'],
                colors: ['#10B981', '#F59E0B', '#EF4444'],
                legend: { position: 'bottom' }
            };

            if (statusChart) statusChart.destroy();
            statusChart = new ApexCharts(document.querySelector("#status-chart"), statusOptions);
            statusChart.render();
        }
    </script>
</body>
</html>
