<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hisobotchi by khamiid</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .view-section { display: none; }
        .view-section.active { display: flex; }
        .sub-view { display: none; }
        .sub-view.active { display: block; }
        .calendar-day { transition: all 0.2s ease-in-out; cursor: pointer; }
        .calendar-day:hover { transform: scale(1.1); background-color: #dbeafe; }
        .animate-fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 font-sans antialiased">

    <div id="login-section" class="view-section active min-h-screen items-center justify-center p-4 bg-slate-900">
        </div>

    <div id="app-section" class="view-section min-h-screen flex-col md:flex-row w-full hidden!">
        <main class="flex-1 p-6 md:p-8 overflow-y-auto bg-gray-50">
            
            <div id="rop-view" class="sub-view active space-y-6 w-full animate-fade-in">
                <h2 class="text-2xl font-bold text-gray-800">ROP Bo'limi</h2>
                
                <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
                    <div class="bg-white p-5 rounded-2xl shadow-sm border">
                        <h3 class="font-bold mb-4">Xodimlar</h3>
                        <div id="rop-workers-list" class="space-y-1"></div>
                        
                        <div class="mt-8 pt-6 border-t">
                            <h3 class="font-bold text-sm mb-4">Statistika "Jami"</h3>
                            <div class="flex justify-between items-center mb-4">
                                <button onclick="changeRopMonth(-1)" class="p-2 bg-gray-100 rounded">◀</button>
                                <span id="rop-month-title" class="font-bold text-sm"></span>
                                <button onclick="changeRopMonth(1)" class="p-2 bg-gray-100 rounded">▶</button>
                            </div>
                            <div id="rop-calendar-grid" class="grid grid-cols-7 gap-1 text-[10px] text-center"></div>
                        </div>
                    </div>

                    <div class="lg:col-span-3">
                        <div id="rop-main-panel" class="space-y-6">
                            <div class="bg-white p-6 rounded-2xl shadow-sm border">
                                <h3 id="rop-stat-title" class="font-bold mb-4">Xodim statistika</h3>
                                <div class="grid grid-cols-4 gap-4">
                                    <div class="bg-blue-50 p-4 rounded-xl text-center"><p class="text-[10px] text-blue-500 font-bold uppercase">Ob</p><p id="rop-stat-ob" class="text-xl font-black">0</p></div>
                                    <div class="bg-emerald-50 p-4 rounded-xl text-center"><p class="text-[10px] text-emerald-500 font-bold uppercase">Aktiv</p><p id="rop-stat-akt" class="text-xl font-black">0</p></div>
                                    <div class="bg-rose-50 p-4 rounded-xl text-center"><p class="text-[10px] text-rose-500 font-bold uppercase">Brak</p><p id="rop-stat-brak" class="text-xl font-black">0</p></div>
                                    <div class="bg-indigo-50 p-4 rounded-xl text-center"><p class="text-[10px] text-indigo-500 font-bold uppercase">Zakaz</p><p id="rop-stat-zakaz" class="text-xl font-black">0</p></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            </main>
    </div>

    <script>
        // Bazaviy o'zgaruvchilar
        const baseUrl = "https://hisotb-46af8-default-rtdb.firebaseio.com/";
        let ropCalYear = 2026, ropCalMonth = 6;
        let selectedWorker = null;

        // Kalendar yaratish funksiyasi
        function buildRopCalendar() {
            const grid = document.getElementById('rop-calendar-grid');
            grid.innerHTML = '';
            const date = new Date(ropCalYear, ropCalMonth, 1);
            document.getElementById('rop-month-title').innerText = date.toLocaleString('uz-UZ', { month: 'long', year: 'numeric' });
            
            const daysInMonth = new Date(ropCalYear, ropCalMonth + 1, 0).getDate();
            for(let i=1; i<=daysInMonth; i++) {
                const btn = document.createElement('div');
                btn.className = "calendar-day p-2 border rounded";
                btn.innerText = i;
                btn.onclick = () => loadStatsForDate(i);
                grid.appendChild(btn);
            }
        }

        function changeRopMonth(dir) {
            ropCalMonth += dir;
            if(ropCalMonth > 11) { ropCalMonth = 0; ropCalYear++; }
            if(ropCalMonth < 0) { ropCalMonth = 11; ropCalYear--; }
            buildRopCalendar();
        }

        async function loadStatsForDate(day) {
            // Shu yerda Firebase'dan tanlangan sana va xodim bo'yicha ma'lumotni yuklaysiz
            // Misol: fetch(`${baseUrl}rop_reports/${ropCalYear}-${ropCalMonth+1}-${day}/${selectedWorker}.json`)
        }

        // Boshlang'ich ishga tushirish
        buildRopCalendar();
    </script>
</body>
</html>
